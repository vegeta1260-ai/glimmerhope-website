<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 106" role="img" aria-label="台灣微光希望關懷協會會徽：雙手捧起的愛心中，孩子伸手觸向微光">
  <defs>
    <radialGradient id="glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#FFFFFF" stop-opacity=".85"/>
      <stop offset="45%" stop-color="#FFEFC9" stop-opacity=".38"/>
      <stop offset="100%" stop-color="#FFEFC9" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="mound" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#CDBFA9"/>
      <stop offset="100%" stop-color="#8F8478" stop-opacity="0"/>
    </linearGradient>
    <clipPath id="leftHalf"><rect x="0" y="0" width="50" height="106"/></clipPath>
    <clipPath id="heartClip">
      <path d="M50 90 C24 70 8 51 8 33 C8 19 19 9 31 9 C39 9 46.5 13.5 50 21 C53.5 13.5 61 9 69 9 C81 9 92 19 92 33 C92 51 76 70 50 90 Z"/>
    </clipPath>
  </defs>

  <!-- 山丘 -->
  <path d="M36 97 Q50 83 64 97 Q57 102 50 102 Q43 102 36 97 Z" fill="url(#mound)"/>

  <!-- 愛心：右半靛藍、左半橘紅 -->
  <path d="M50 90 C24 70 8 51 8 33 C8 19 19 9 31 9 C39 9 46.5 13.5 50 21 C53.5 13.5 61 9 69 9 C81 9 92 19 92 33 C92 51 76 70 50 90 Z" fill="#4193C9"/>
  <path d="M50 90 C24 70 8 51 8 33 C8 19 19 9 31 9 C39 9 46.5 13.5 50 21 C53.5 13.5 61 9 69 9 C81 9 92 19 92 33 C92 51 76 70 50 90 Z" fill="#E8752B" clip-path="url(#leftHalf)"/>

  <g clip-path="url(#heartClip)">
    <!-- 捧起的雙手 -->
    <path d="M14 44 C17 60 28 71 46 76 C39 67 35 56 34 45 C33 37 28 34 23 36 C18 38 14 40 14 44 Z" fill="#B8541B" opacity=".92"/>
    <path d="M86 44 C83 60 72 71 54 76 C61 67 65 56 66 45 C67 37 72 34 77 36 C82 38 86 40 86 44 Z" fill="#2C6EA3" opacity=".92"/>
    <!-- 頂端微光 -->
    <circle cx="50" cy="23" r="15" fill="url(#glow)"/>
    <!-- 內部小丘 -->
    <ellipse cx="50" cy="75.5" rx="10.5" ry="3" fill="#C9BCA9" opacity=".9"/>
  </g>

  <!-- 孩子（白色剪影，右手伸向微光） -->
  <g fill="none" stroke="#FFFFFF" stroke-linecap="round">
    <line x1="50" y1="56" x2="50" y2="66" stroke-width="8.4"/>
    <line x1="46.4" y1="58" x2="40.6" y2="46.5" stroke-width="3.6"/>
    <line x1="53.4" y1="58" x2="57.2" y2="64.5" stroke-width="3.6"/>
    <line x1="47.6" y1="67" x2="47.6" y2="73.5" stroke-width="3.8"/>
    <line x1="52.4" y1="67" x2="52.4" y2="73.5" stroke-width="3.8"/>
  </g>
  <circle cx="50" cy="47.5" r="5.4" fill="#FFFFFF"/>

  <!-- 星光 -->
  <path d="M50 15.5 L51.7 21.3 L57.5 23 L51.7 24.7 L50 30.5 L48.3 24.7 L42.5 23 L48.3 21.3 Z" fill="#FFFFFF"/>
  <path d="M36 27 L36.9 29.6 L39.5 30.5 L36.9 31.4 L36 34 L35.1 31.4 L32.5 30.5 L35.1 29.6 Z" fill="#FFFFFF" opacity=".85"/>
  <path d="M64.5 30 L65.3 32.2 L67.5 33 L65.3 33.8 L64.5 36 L63.7 33.8 L61.5 33 L63.7 32.2 Z" fill="#FFFFFF" opacity=".8"/>
  <path d="M60 16.5 L60.7 18.3 L62.5 19 L60.7 19.7 L60 21.5 L59.3 19.7 L57.5 19 L59.3 18.3 Z" fill="#FFFFFF" opacity=".7"/>
</svg>
