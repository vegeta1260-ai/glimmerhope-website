<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 106" role="img" aria-label="台灣微光希望關懷協會會徽：雙手捧起的愛心中，孩子伸手觸向微光">
  <defs>
    <radialGradient id="glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#FFFFFF" stop-opacity=".95"/>
      <stop offset="45%" stop-color="#FFF3D6" stop-opacity=".45"/>
      <stop offset="100%" stop-color="#FFF3D6" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="mound" cx="50%" cy="40%" r="60%">
      <stop offset="0%" stop-color="#FFFFFF" stop-opacity=".85"/>
      <stop offset="100%" stop-color="#FFFFFF" stop-opacity="0"/>
    </radialGradient>
    <clipPath id="leftHalf"><rect x="0" y="0" width="50" height="106"/></clipPath>
    <clipPath id="heartClip">
      <path d="M50 90 C24 70 8 51 8 33 C8 19 19 9 31 9 C39 9 46.5 13.5 50 21 C53.5 13.5 61 9 69 9 C81 9 92 19 92 33 C92 51 76 70 50 90 Z"/>
    </clipPath>
  </defs>

  <!-- 底部光暈 -->
  <ellipse cx="50" cy="97" rx="20" ry="6" fill="url(#mound)"/>

  <!-- 愛心：左橘 #EF6F0C、右藍 #2497D6（CI 標準色） -->
  <path d="M50 90 C24 70 8 51 8 33 C8 19 19 9 31 9 C39 9 46.5 13.5 50 21 C53.5 13.5 61 9 69 9 C81 9 92 19 92 33 C92 51 76 70 50 90 Z" fill="#2497D6"/>
  <path d="M50 90 C24 70 8 51 8 33 C8 19 19 9 31 9 C39 9 46.5 13.5 50 21 C53.5 13.5 61 9 69 9 C81 9 92 19 92 33 C92 51 76 70 50 90 Z" fill="#EF6F0C" clip-path="url(#leftHalf)"/>

  <g clip-path="url(#heartClip)">
    <!-- 捧起的雙手（白色線條，呼應官方樣式） -->
    <g fill="none" stroke="#FFFFFF" stroke-width="2.4" stroke-linecap="round" opacity=".9">
      <path d="M18 42 C19 56 26 67 38 73 C33 65 30 56 29.5 47 C29.2 42 26 40 23 41.5 C20.5 42.7 18.5 43 18 42 Z"/>
      <path d="M82 42 C81 56 74 67 62 73 C67 65 70 56 70.5 47 C70.8 42 74 40 77 41.5 C79.5 42.7 81.5 43 82 42 Z"/>
    </g>
    <!-- 頂端微光 -->
    <circle cx="50" cy="20" r="16" fill="url(#glow)"/>
    <!-- 光芒線 -->
    <g stroke="#FFFFFF" stroke-width="1.1" stroke-linecap="round" opacity=".85">
      <line x1="50" y1="9" x2="50" y2="13.5"/>
      <line x1="41" y1="12" x2="43.5" y2="15.8"/>
      <line x1="59" y1="12" x2="56.5" y2="15.8"/>
      <line x1="37.5" y1="20" x2="42" y2="20"/>
      <line x1="62.5" y1="20" x2="58" y2="20"/>
    </g>
    <!-- 內部小丘 -->
    <ellipse cx="50" cy="76" rx="11" ry="3" fill="#FFFFFF" opacity=".55"/>
  </g>

  <!-- 孩子（白色剪影，右手伸向微光） -->
  <g fill="none" stroke="#FFFFFF" stroke-linecap="round">
    <line x1="50" y1="56" x2="50" y2="66" stroke-width="8.4"/>
    <line x1="46.4" y1="58" x2="40.6" y2="46.5" stroke-width="3.6"/>
    <line x1="53.4" y1="58" x2="57.2" y2="64.5" stroke-width="3.6"/>
    <line x1="47.6" y1="67" x2="47.6" y2="73.5" stroke-width="3.8"/>
    <line x1="52.4" y1="67" x2="52.4" y2="73.5" stroke-width="3.8"/>
  </g>
  <circle cx="50" cy="47.5" r="5.4" fill="#FFFFFF"/>

  <!-- 星光 -->
  <path d="M50 14 L51.8 20 L57.8 21.8 L51.8 23.6 L50 29.6 L48.2 23.6 L42.2 21.8 L48.2 20 Z" fill="#FFFFFF"/>
  <path d="M35 26 L35.9 28.6 L38.5 29.5 L35.9 30.4 L35 33 L34.1 30.4 L31.5 29.5 L34.1 28.6 Z" fill="#FFFFFF" opacity=".9"/>
  <path d="M65.5 29 L66.3 31.2 L68.5 32 L66.3 32.8 L65.5 35 L64.7 32.8 L62.5 32 L64.7 31.2 Z" fill="#FFFFFF" opacity=".85"/>
  <path d="M71 17.5 L71.7 19.3 L73.5 20 L71.7 20.7 L71 22.5 L70.3 20.7 L68.5 20 L70.3 19.3 Z" fill="#FFFFFF" opacity=".75"/>
</svg>
